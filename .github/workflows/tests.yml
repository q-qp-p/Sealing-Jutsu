name: tests

on:
  push:
    branches:
      - main
      - master
      - "fix/**"
      - "feat/**"
      - "docs/**"
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile entry points
        run: |
          python -m py_compile run_capsuleguard.py run_llm_experiment.py run_sensitivity.py
          python -m py_compile paper/build_submission_draft_v2.py

      - name: Run unit tests
        run: python -m unittest discover -s tests
